node_name = "avoverip-rx-pi"

[platform]
profile = "raspberry_pi"

[network]
multicast_group = "239.255.10.10"
video_port = 5004
audio_port = 5006
interface = "auto"
ttl = 1
video_payload_type = 96
audio_payload_type = 97
rtp_mtu = 1200
receive_buffer_size = 0

[http]
bind_addr = "127.0.0.1"
port = 8082

[recovery]
restart_backoff_ms = 1000
monitor_interval_ms = 250

[video]
width = 1920
height = 1080
fps = 30
jitter_latency_ms = 20
decoder_element = "decodebin"
renderer = "kms_drm"
fullscreen = true
sync = true
max_lateness_ms = 25

[audio]
enabled = false
device = "default"
sample_rate = 48000
channels = 2
jitter_latency_ms = 30
buffer_time_us = 20000
latency_time_us = 5000
sync = true
late_threshold_ms = 60
sync_tolerance_ms = 40
